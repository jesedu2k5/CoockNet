<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña - CoockNet</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .card {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #27ae60;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #219a52; }
        .mensaje { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
        .exito { background: #eafaf1; color: #27ae60; }
        .error { background: #fdecea; color: #e74c3c; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">Cook<span>Net</span></a>
    </nav>

    <div class="card">
        <h2>Nueva contraseña</h2>
        <input type="password" id="password" placeholder="Nueva contraseña" required>
        <input type="password" id="confirmar" placeholder="Confirmar contraseña" required>
        <button onclick="resetear()">Cambiar contraseña</button>
        <div id="mensaje" class="mensaje"></div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) window.location.href = 'forgot_password.html';

        async function resetear() {
            const password = document.getElementById('password').value;
            const confirmar = document.getElementById('confirmar').value;
            const msg = document.getElementById('mensaje');

            if (password !== confirmar) {
                msg.textContent = 'Las contraseñas no coinciden.';
                msg.className = 'mensaje error';
                msg.style.display = 'block';
                return;
            }

            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword: password })
            });

            const data = await res.json();
            msg.textContent = data.message || data.error;
            msg.className = 'mensaje ' + (res.ok ? 'exito' : 'error');
            msg.style.display = 'block';

            if (res.ok) {
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - CoockNet</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .card {
            max-width: 400px;
            margin: 80px auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-top: 5px solid #e67e22;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #d35400; }
        .mensaje { margin-top: 15px; padding: 10px; border-radius: 5px; display: none; }
        .exito { background: #eafaf1; color: #27ae60; }
        .error { background: #fdecea; color: #e74c3c; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">Cook<span>Net</span></a>
    </nav>

    <div class="card">
        <h2>Recuperar contraseña</h2>
        <p style="color:#888; font-size:0.9rem; margin-bottom:20px;">
            Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
        </p>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <button onclick="enviar()">Enviar enlace</button>
        <div id="mensaje" class="mensaje"></div>
        <p style="margin-top:20px; font-size:0.9rem;">
            <a href="login.html" style="color:#e67e22;">Volver al login</a>
        </p>
    </div>

    <script>
        async function enviar() {
            const email = document.getElementById('email').value;
            const msg = document.getElementById('mensaje');

            if (!email) return;

            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });

            const data = await res.json();
            msg.textContent = data.message || data.error;
            msg.className = 'mensaje ' + (res.ok ? 'exito' : 'error');
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
